<!DOCTYPE html>
<html lang="en">
<head th:insert="~{fragments/header}"></head>
<body class="bg-light">

<div class="container mt-5 mb-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow-sm border-0">
                <div class="card-header bg-warning text-dark py-3">
                    <h4 class="mb-0">Actualizar Rol de Usuario</h4>
                </div>
                <div class="card-body p-4">
                    <form th:action="@{/actualizarRolUsuario/{id}(id=${usuario.id})}" method="post">
                        <input type="hidden" name="_method" value="put">

                        <div class="mb-3">
                            <label for="username" class="form-label fw-bold">Username:</label>
                            <input type="text" class="form-control bg-light" id="username" name="username" th:value="${usuario.username}" required disabled>
                        </div>

                        <div class="mb-3">
                            <label for="rol" class="form-label fw-bold">Rol:</label>
                            <select class="form-select" id="rol" name="rol" required onchange="toggleInputs()">
                                <option value="ROL_ADMIN" th:selected="${usuario.rol == 'ROL_ADMIN'}">Administrador</option>
                                <option value="ROL_LECTURA" th:selected="${usuario.rol == 'ROL_LECTURA'}">Lectura</option>
                                <option value="ROL_DIRECTOR" th:selected="${usuario.rol == 'ROL_DIRECTOR'}">Director</option>
                            </select>
                        </div>

                        <div class="p-3 bg-white border rounded shadow-sm mb-4" id="directorFieldsContainer" style="display: none;">
                            <h6 class="text-primary border-bottom pb-2 mb-3">Datos de Director</h6>
                            <div class="mb-3" id="nacionalidadGroup" style="display: none;">
                                <label for="nacionalidad" class="form-label">Nacionalidad:</label>
                                <input type="text" class="form-control" id="nacionalidad" name="nacionalidad" required>
                            </div>
                            <div class="mb-3" id="fechaNacimientoGroup" style="display: none;">
                                <label for="fechaNacimiento" class="form-label">Fecha de Nacimiento:</label>
                                <input type="date" class="form-control" id="fechaNacimiento" name="fechaNacimiento" min="1970-01-01" max="3000-12-31" required>
                            </div>
                            <div class="mb-3" id="emailGroup" style="display: none;">
                                <label for="email" class="form-label">Email:</label>
                                <input type="email" class="form-control" id="email" name="email" required>
                            </div>
                        </div>

                        <div class="d-grid">
                            <button type="submit" class="btn btn-warning fw-bold">Actualizar Usuario</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script th:inline="javascript">
  function toggleInputs() {
    const rol = document.getElementById("rol").value;
    const fields = ["nacionalidad", "fechaNacimiento", "email"];
    const isDirector = rol === "ROL_DIRECTOR";
    
    document.getElementById("directorFieldsContainer").style.display = isDirector ? "block" : "none";

    fields.forEach(field => {
      const group = document.getElementById(`${field}Group`);
      const input = document.getElementById(field);

      group.style.display = isDirector ? "block" : "none";
      input.required = isDirector;
    });
  }

  window.onload = function() { toggleInputs(); }
</script>

<div th:replace="~{fragments/footer}"></div>
</body>
</html>
