<!DOCTYPE html>
<html lang="en">
<head th:insert="~{fragments/header}"></head>
<body class="bg-light">

<div class="container mt-5 mb-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow-sm border-0">
                <div class="card-header bg-success text-white d-flex justify-content-between align-items-center py-3">
                    <h4 class="mb-0">Agregar Plataforma</h4>
                    <a th:href="@{/plataformas}" class="btn btn-sm btn-outline-light">Ver Lista</a>
                </div>
                <div class="card-body p-4">
                    <form th:action="@{/guardarPlataforma}" method="post">
                        <div class="mb-3">
                            <label for="nombre" class="form-label fw-bold">Nombre:</label>
                            <input type="text" id="nombre" name="nombre" class="form-control" placeholder="Ej. Netflix, Amazon..." required>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="precio" class="form-label fw-bold">Precio:</label>
                                <input type="number" id="precio" name="precio" class="form-control" min="0" max="999" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label for="moneda" class="form-label fw-bold">Moneda:</label>
                                <input type="text" id="moneda" name="moneda" class="form-control" placeholder="Ej. USD, ARS" required>
                            </div>
                        </div>

                        <div class="mb-4">
                            <label for="enlace" class="form-label fw-bold">Enlace:</label>
                            <input type="url" id="enlace" name="enlace" class="form-control" placeholder="https://..." required>
                        </div>

                        <div class="d-grid">
                            <button type="submit" class="btn btn-success btn-lg">Guardar Plataforma</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<div th:replace="~{fragments/footer}"></div>
</body>
</html>
