<!DOCTYPE html>
<html lang="en">
<head th:insert="~{fragments/header}"></head>
<body class="bg-light">

<div class="container mt-5 mb-5">
    <div class="card shadow-sm border-0">
        <div class="card-body p-4">
            
            <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-2">
                <h2 class="mb-0 text-dark">Plataformas Disponibles</h2>
                <a th:href="@{/peliculas}" class="btn btn-secondary shadow-sm">Ver Lista de Películas</a>
            </div>

            <div class="table-responsive">
                <table class="table table-hover table-striped align-middle border">
                    <thead class="table-dark text-center">
                    <tr>
                        <th>ID</th>
                        <th>Nombre</th>
                        <th>Precio</th>
                        <th>Moneda</th>
                        <th>Enlace</th>
                    </tr>
                    </thead>
                    <tbody class="text-center">
                    <tr th:each="plataforma : ${plataformas}">
                        <td class="fw-bold text-secondary" th:text="${plataforma.id}"></td>
                        <td class="fw-bold" th:text="${plataforma.nombre}"></td>
                        <td><span class="badge bg-success fs-6" th:text="${plataforma.precio}"></span></td>
                        <td class="text-muted fw-bold" th:text="${plataforma.moneda}"></td>
                        <td>
                            <a th:href="${plataforma.enlace}" target="_blank" class="btn btn-sm btn-outline-info">🌐 Ir al sitio</a>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(plataformas)}">
                        <td colspan="5" class="text-center text-muted py-4">No hay plataformas registradas.</td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<div th:replace="~{fragments/footer}"></div>
</body>
</html>
