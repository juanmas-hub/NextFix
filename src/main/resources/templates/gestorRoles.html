<!DOCTYPE html>
<html lang="en" xmlns:sec="http://www.w3.org/1999/xhtml">
<head th:insert="~{fragments/header}"></head>
<body class="bg-light">

<div class="container mt-5 mb-5">
    
    <div class="alert alert-danger shadow-sm d-flex justify-content-between align-items-center mb-4 border-0">
        <div>
            <strong>👤 Admin Autenticado:</strong> <span sec:authentication="principal.username"></span> <br>
            <strong>🛡️ Permisos:</strong> <span sec:authentication="principal.authorities"></span>
        </div>
        <a th:href="@{/peliculas}" class="btn btn-light shadow-sm">🏠 Volver a Inicio</a>
    </div>

    <div class="card shadow-sm border-0">
        <div class="card-body p-4">
            <h3 class="mb-4 text-dark border-bottom pb-2">Panel - Gestor de Roles</h3>

            <div class="table-responsive">
                <table class="table table-hover table-striped align-middle border">
                    <thead class="table-dark text-center">
                    <tr>
                        <th>ID</th>
                        <th>Username</th>
                        <th>Rol</th>
                        <th>Nombre</th>
                        <th>Apellido</th>
                        <th>Email Director</th>
                        <th sec:authorize="hasAuthority('ROL_ADMIN')">Acciones</th>
                    </tr>
                    </thead>
                    <tbody class="text-center">
                    <tr th:each="usuario : ${usuarios}">
                        <td class="fw-bold text-secondary" th:text="${usuario.id}"></td>
                        <td th:text="${usuario.username}"></td>
                        <td><span class="badge bg-primary" th:text="${usuario.rol}"></span></td>
                        <td th:text="${usuario.nombre}"></td>
                        <td th:text="${usuario.apellido}"></td>
                        <td class="text-muted" th:text="${usuario.director?.email ?: '-'}"></td>
                        
                        <td sec:authorize="hasAuthority('ROL_ADMIN')">
                            <div class="d-flex justify-content-center gap-2">
                                <a th:href="@{/actualizarRolUsuario/{id}(id=${usuario.id})}" class="btn btn-sm btn-warning">Editar</a>
                                <button th:onclick="'eliminarUsuarioConfirmacion(\'' + ${usuario.id} + '\');'" class="btn btn-sm btn-danger">Eliminar</button>
                            </div>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script>
    function eliminarUsuarioConfirmacion(id) {
        Swal.fire({
            title: '¿Desea eliminar este usuario?',
            text: "Cuidado: Esta acción es permanente.",
            icon: 'warning',
            showCancelButton: true,
            confirmButtonColor: '#dc3545',
            cancelButtonColor: '#6c757d',
            confirmButtonText: 'Sí, eliminar',
            cancelButtonText: 'Cancelar'
        }).then((result) => {
            if (result.isConfirmed) {
                location.href = '/eliminarUsuario/' + id;
            }
        });
    }
</script>

<div th:replace="~{fragments/footer}"></div>
</body>
</html>
